apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: my-app-release
  namespace: default
spec:
  replicas: 5
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: my-app
          image: ghcr.io/thuanthentran/dqn-lstm-agent-driven-canary-release/my-app:latest
          env:
            - name: APP_SCENARIO
              value: "critical_crash"
            - name: APP_VERSION
              value: "v4.0.0"
          ports:
            - name: http
              containerPort: 8080

strategy:
    canary:
      canaryService: my-app-canary
      stableService: my-app-stable
      trafficRouting:
        nginx:
          stableIngress: my-app-ingress
      steps:
        - setWeight: 10
        - analysis:
            templates: [{templateName: traditional-error-rate-check}]
            args: [{name: canary-service, value: "my-app-canary"}]
        - setWeight: 30
        - analysis:
            templates: [{templateName: traditional-error-rate-check}]
            args: [{name: canary-service, value: "my-app-canary"}]
        - setWeight: 50
        - analysis:
            templates: [{templateName: traditional-error-rate-check}]
            args: [{name: canary-service, value: "my-app-canary"}]
        - setWeight: 100