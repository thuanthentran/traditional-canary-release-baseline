name: CI Build and Push Images (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - 'my-app/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Sử dụng context tự động, không cần secrets thủ công
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and push my-app
        uses: docker/build-push-action@v5
        with:
          context: my-app
          file: my-app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/my-app:latest
            ghcr.io/${{ github.repository }}/my-app:${{ steps.vars.outputs.sha_short }}
